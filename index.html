<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* 漂亮的渐变背景 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 卡片容器样式 */
        .card {
            background: rgba(255, 255, 255, 0.9); /* 半透明白色 */
            backdrop-filter: blur(10px); /* 毛玻璃模糊效果 */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); /* 鼠标悬停微微上浮 */
        }

        /* 头像样式 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* 文字样式 */
        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            color: #2d3748;
        }

        p.bio {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* 按钮/链接样式 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            background-color: #4a5568;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2d3748;
        }

        .btn.primary {
            background-color: #667eea;
        }
        
        .btn.primary:hover {
            background-color: #5a67d8;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 这里的 src 可以换成你自己的图片链接 -->
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="avatar">
        
        <h1>Chen Jiaxin</h1>
        <p class="bio">
            你好！这是我的个人主页。<br>
            热爱编程，喜欢探索新技术。<br>
            欢迎来到我的数字花园。
        </p>

        <div class="links">
            <a href="#" class="btn primary">阅读我的博客</a>
            <a href="https://github.com" target="_blank" class="btn">访问 GitHub</a>
            <a href="mailto:your@email.com" class="btn">联系我</a>
        </div>

        <footer>
            &copy; 2026 Chen Jiaxin. All rights reserved.
        </footer>
    </div>

</body>
</html>
